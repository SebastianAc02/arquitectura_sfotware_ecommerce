{% extends 'base_public.html' %}

{% block title %}Iniciar sesión — Kibo{% endblock %}

{% block content %}
<div style="max-width:460px;margin:0 auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.08);">
    <h1 style="font-size:24px;margin-bottom:8px;">Iniciar sesión</h1>
    <p style="color:#666;margin-bottom:18px;">Accede a tu cuenta de Kibo.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background:#3b3028;color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer;">Entrar</button>
    </form>

    <p style="margin-top:16px;font-size:14px;">
        ¿No tienes cuenta? <a href="{% url 'accounts:register' %}">Regístrate aquí</a>
    </p>
</div>
{% endblock %}
