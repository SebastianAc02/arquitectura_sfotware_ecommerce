<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kibo Admin{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background:#f5f7fb; color:#1f2937; }
        .layout { display:grid; grid-template-columns:260px 1fr; min-height:100vh; }
        aside { background:#111827; color:#fff; padding:22px 16px; }
        aside h1 { font-size:20px; margin-bottom:20px; }
        aside a { color:#d1d5db; display:block; padding:10px 12px; border-radius:8px; text-decoration:none; margin-bottom:8px; }
        aside a:hover { background:#1f2937; color:#fff; }
        main { padding:24px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
        .card { background:#fff; border-radius:12px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,.08); }
        .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; }
        table { width:100%; border-collapse:collapse; }
        th, td { text-align:left; padding:10px; border-bottom:1px solid #e5e7eb; }
        .btn { display:inline-block; background:#111827; color:#fff; padding:8px 12px; border-radius:8px; text-decoration:none; border:none; cursor:pointer; }
        .btn.secondary { background:#6b7280; }
        .btn.danger { background:#b91c1c; }
        .muted { color:#6b7280; font-size:13px; }
        form p { margin-bottom:10px; }
        input, select, textarea { width:100%; padding:9px; border:1px solid #d1d5db; border-radius:8px; }
        .messages { margin-bottom:14px; }
        .messages li { list-style:none; background:#ecfeff; border:1px solid #a5f3fc; padding:10px; border-radius:8px; margin-bottom:8px; }
    </style>
</head>
<body>
<div class="layout">
    <aside>
        <h1>🐾 Kibo Admin</h1>
        <a href="{% url 'admin_panel:dashboard' %}">Dashboard</a>
        <a href="{% url 'admin_panel:product_list' %}">Productos</a>
        <a href="{% url 'admin_panel:order_list' %}">Órdenes</a>
        <a href="{% url 'store:home' %}">Tienda pública</a>
        <a href="{% url 'accounts:profile' %}">Mi perfil</a>
        <a href="{% url 'accounts:logout' %}">Cerrar sesión</a>
    </aside>
    <main>
        <div class="topbar">
            <h2>{% block page_title %}Panel{% endblock %}</h2>
            <p class="muted">Usuario: {{ request.user.username }}</p>
        </div>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</div>
</body>
</html>
